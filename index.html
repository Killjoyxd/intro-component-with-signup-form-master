<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Big+Shoulders:opsz,wght@10..72,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kumbh+Sans:wght,YOPQ@100..900,300&family=Lexend+Deca:wght@100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Young+Serif&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Intro component with sign up form</title>
    
  </head>
  <body>
    <div class="container">
      <div class="box1">
        <h1>Learn to code by watching others</h1>
        <p class="text">
          See how experienced developers solve problems in real-time. Watching
          scripted tutorials is great, but understanding how developers think is
          invaluable.
        </p>
      </div>
      <div class="box2">
        <p class="trial">Try it free 7 days then $20/mo. thereafter</p>
        <div class="sign-up">
          <form class="form">
            <div class="input">
              <input
                class="input1"
                type="text"
                name="first-name"
                id="first-name"
                placeholder="First Name"
              />
            </div>

            <div class="input">
              <input
                class="input1"
                type="text"
                name="last-name"
                id="last-name"
                placeholder="Last Name"
              />
            </div>

            <div class="input">
              <input
                class="input1"
                type="email"
                name="email"
                id="email"
                placeholder="Email Address"
              />
            </div>

            <div class="input">
              <input
                class="input1"
                type="password"
                name="password"
                id="password"
                placeholder="Password"
              />
            </div>

            <button type="submit">Claim your free trial</button>
            <p class="terms">
              By clicking the button, you are agreeing to our
              <a href="#" class="terms-link">Terms and Services</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
